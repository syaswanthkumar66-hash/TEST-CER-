<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoTYK Device Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl p-6 space-y-6">
        
        <!-- Header -->
        <div>
            <h2 class="text-2xl font-bold text-white tracking-wide">IoTYK Admin</h2>
            <p class="text-sm text-gray-400 mt-1">Manage EMQX MQTT credentials securely via Vercel.</p>
        </div>

        <hr class="border-gray-800" />

        <!-- SECTION 1: PROVISION NEW DEVICE -->
        <div class="space-y-4">
            <h3 class="text-sm font-semibold text-emerald-400 uppercase tracking-wider">1. Provision Device</h3>
            <div>
                <label class="block text-xs text-gray-400 mb-1">New MQTT Username</label>
                <input id="mqttUser" type="text" placeholder="e.g., esp32_sensor_01" 
                       class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500 transition">
            </div>
            <div>
                <label class="block text-xs text-gray-400 mb-1">New MQTT Password</label>
                <input id="mqttPass" type="text" placeholder="e.g., mySecurePass123" 
                       class="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-3 text-sm text-white focus:outline-none focus:border-emerald-500 transition">
            </div>
            
            <button id="submitBtn" onclick="provisionDevice()" 
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-medium rounded-lg py-3 transition-all shadow-lg active:scale-[0.98]">
                Create User in EMQX
            </button>
        </div>

        <hr class="border-gray-800 my-6" />

        <!-- SECTION 2: MANAGE EXISTING DEVICES -->
        <div class="space-y-4">
            <h3 class="text-sm font-semibold text-blue-400 uppercase tracking-wider">2. Manage Devices</h3>
            
            <button onclick="fetchUsers()" 
                    class="w-full bg-gray-800 hover:bg-gray-700 text-white text-sm font-medium rounded-lg py-2 transition-all active:scale-[0.98]">
                Load Active Devices
            </button>

            <!-- Box to display the retrieved users -->
            <div id="userList" class="p-3 bg-gray-950 rounded-lg border border-gray-800 text-xs text-gray-400 font-mono min-h-[80px] max-h-[150px] overflow-y-auto whitespace-pre-wrap">
                Click load to view users...
            </div>

            <!-- Delete User Input & Button -->
            <div class="flex gap-2 pt-2">
                <input id="deleteUser" type="text" placeholder="Username to delete" 
                       class="flex-1 bg-gray-950 border border-gray-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-red-500 transition">
                <button onclick="deleteDevice()" 
                        class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg font-medium transition-all active:scale-[0.95]">
                    Delete
                </button>
            </div>
        </div>

        <!-- Global Status Console -->
        <div id="statusBox" class="hidden p-3 rounded-lg border text-xs font-mono transition-all mt-4">
            Ready
        </div>

    </div>

    <script>
        // --- Helper Function: Show UI Status ---
        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.className = 'p-3 rounded-lg border text-xs font-mono transition-all block mt-4';
            
            if (type === 'error') {
                box.classList.add('bg-red-950/50', 'border-red-800', 'text-red-400');
            } else if (type === 'success') {
                box.classList.add('bg-emerald-950/50', 'border-emerald-800', 'text-emerald-400');
            } else {
                box.classList.add('bg-blue-950/50', 'border-blue-800', 'text-blue-400');
            }
            box.innerText = msg;
        }

        // --- CREATE: Provision a New User ---
        async function provisionDevice() {
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('mqttUser').value.trim();
            const password = document.getElementById('mqttPass').value.trim();

            if (!username || !password) {
                showStatus('Error: Username and Password required.', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Communicating with Vercel...';
            showStatus('Sending credentials to backend API...', 'info');

            try {
                const response = await fetch('/api/provision', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(`✅ Success: ${data.message}`, 'success');
                    document.getElementById('mqttUser').value = '';
                    document.getElementById('mqttPass').value = '';
                    fetchUsers(); // Auto-refresh the list after creation
                } else {
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('❌ Network Error: Could not reach Vercel API', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Create User in EMQX';
            }
        }

        // --- READ: Get Back Saved Users ---
        async function fetchUsers() {
            const listBox = document.getElementById('userList');
            listBox.innerText = 'Loading...';
            showStatus('Fetching active devices from EMQX...', 'info');

            try {
                const response = await fetch('/api/manage', { method: 'GET' });
                const data = await response.json();

                if (data.success) {
                    if (data.users.length === 0) {
                        listBox.innerText = 'No users found in EMQX.';
                    } else {
                        // Extract user_id and display them
                        const usernames = data.users.map(u => `• ${u.user_id}`).join('\n');
                        listBox.innerText = usernames;
                    }
                    showStatus(`✅ Successfully loaded ${data.users.length} devices.`, 'success');
                } else {
                    listBox.innerText = `Error: ${data.error}`;
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                listBox.innerText = 'Network Error.';
                showStatus('❌ Network Error while fetching users.', 'error');
            }
        }

        // --- DELETE: Remove a User ---
        async function deleteDevice() {
            const username = document.getElementById('deleteUser').value.trim();
            
            if (!username) {
                showStatus('Please enter a username to delete.', 'error');
                return;
            }

            if (!confirm(`Are you sure you want to permanently delete "${username}"?`)) return;

            showStatus(`Deleting ${username}...`, 'info');

            try {
                const response = await fetch('/api/manage', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (response.ok || data.success) {
                    showStatus(`✅ Successfully deleted ${username}`, 'success');
                    document.getElementById('deleteUser').value = '';
                    fetchUsers(); // Auto-refresh the list
                } else {
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus('❌ Network Error: Could not reach Vercel API', 'error');
            }
        }
    </script>
</body>
</html>
